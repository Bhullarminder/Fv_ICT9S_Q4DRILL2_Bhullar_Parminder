<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container bg-dark text-light p-4 mt-5 w-50 text-center rounded mx-auto">
    <h1>Heat Index Checker</h1>
    <details id="instructions">
        <summary>Instructions:</summary>
        <p id="Instruct" class="text-center">Enter your area's temperature to find out your condition.</p>
    </details>

    <div class="d-flex justify-content-center mb-2">
        <input class="form-control" style="width: 450px;" type="number" id="temperature" placeholder="Enter temperature">
    </div>
    <div class="d-flex justify-content-center mb-3">
        <input class="form-control" style="width: 450px;" type="number" id="humidity" placeholder="Enter humidity">
    </div>

    <div class="text-center mt-3">
        <button class="btn btn-success" onclick="check()">Check</button>
    </div>
</div>

<script>
function check(){
    var temperature = Number(document.getElementById("temperature").value);
    var humidity = Number(document.getElementById("humidity").value);

    var HeatIndex = temperature + (0.33 * humidity) - 4; 
    var Result = "";

    switch (true){
        case (HeatIndex <= 27): 
            Result = "Comfortable / Cool";
            break;
        case (HeatIndex >= 28 && HeatIndex <= 32):
            Result = "Warm";
            break;
        case (HeatIndex >= 33 && HeatIndex <= 37):
            Result = "Hot";
            break;
        case (HeatIndex >= 38 && HeatIndex <= 41):
            Result = "Very Hot / Caution";
            break;
        case (HeatIndex >= 42):
            Result = "Extreme Heat / Danger";
            break;
        default: 
            Result = "Cannot be determined..."; 
            break;
    }

    alert(Result);
}
</script>
</body>
</html>
