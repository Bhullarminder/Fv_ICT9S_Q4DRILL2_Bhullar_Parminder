<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="text-primary mb-3">Heat Index Checker</h1>

    <div class="mb-3">
        <details>
            <summary class="fw-bold">How to use this page</summary>
            <p>Enter temperature (°C) and humidity (%) below, then click "Check Heat Index" to see the status.</p>
        </details>
    </div>

    <div class="mb-3">
        <label for="temperature" class="form-label">Temperature (°C)</label>
        <input type="number" class="form-control" id="temperature" placeholder="Enter temperature">
    </div>

    <div class="mb-3">
        <label for="humidity" class="form-label">Humidity (%)</label>
        <input type="number" class="form-control" id="humidity" placeholder="Enter humidity">
    </div>

    <button class="btn btn-success mb-3" onclick="checkHeatIndex()">Check Heat Index</button>

    <div id="result" class="fw-bold"></div>

</div>

<script>
function checkHeatIndex() {
    var temp = parseFloat(document.getElementById("temperature").value);
    var hum = parseFloat(document.getElementById("humidity").value);
    var message = "";

    let heatIndex = temp + (0.33 * hum) - 4;

    switch(true) {
        case ((temp >= 20 && temp <= 24 && hum >= 30 && hum <= 50) || 
              (temp >= 25 && temp <= 27 && hum >= 40 && hum <= 60)):
            message = `Heat Index: ${heatIndex.toFixed(1)}°C - Office / Cool`;
            break;
        case (temp >= 28 && temp <= 31 && hum >= 50 && hum <= 70):
            message = `Heat Index: ${heatIndex.toFixed(1)}°C - Warm`;
            break;
        case (temp >= 32 && temp <= 35 && hum >= 60 && hum <= 80):
            message = `Heat Index: ${heatIndex.toFixed(1)}°C - Hot`;
            break;
        case (temp >= 36 && hum >= 70 && hum <= 100 && heatIndex >= 42):
            message = `Heat Index: ${heatIndex.toFixed(1)}°C - Extreme Heat / Danger`;
            break;
        case (temp >= 36 && hum >= 70 && hum <= 100 && heatIndex < 42):
            message = `Heat Index: ${heatIndex.toFixed(1)}°C - Very Hot / Caution`;
            break;
        default:
            message = `Invalid input or Status unclear`;
    }

    document.getElementById("result").innerHTML = message;
}
</script>

</body>
</html>
